version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: eth-crawler-postgres
    env_file:
      - .env.docker
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eth-crawler-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eth-crawler-app
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - eth-crawler-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  eth-crawler-network:
    driver: bridge
