version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: eth-crawler-postgres
    environment:
      POSTGRES_DB: eth_transactions
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      # Persist database data
      - postgres_data:/var/lib/postgresql/data
      # Auto-initialize schema on first run
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eth-crawler-network

  # Node.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eth-crawler-app
    ports:
      - "3000:3000"
    env_file:
      - .env.docker
    environment:
      # Override with Docker-specific settings
      PORT: 3000
      # Database configuration (connects to postgres container)
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: eth_transactions
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - eth-crawler-network
    restart: unless-stopped

# Named volumes for data persistence
volumes:
  postgres_data:
    driver: local

# Custom network
networks:
  eth-crawler-network:
    driver: bridge
